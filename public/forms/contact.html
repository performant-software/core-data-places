<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TinaCMS</title>
</head>
<body>
  <form
    data-netlify="true"
    data-netlify-honeypot="bot-field"
    method="POST"
    name="contact"
  >
    <input
      name="form-name"
      type="hidden"
      value="contact"
    />
    <input
      name="bot-field"
      type="text"
    />
    <input
      name="name"
      type="text"
    />
    <input
      name="email"
      type="text"
    />
    <input
      name="organization"
      type="text"
    />
    <textarea
      name="message"
    />
  </form>
</body>
</html>
